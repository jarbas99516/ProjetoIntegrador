 
<div class="container mt-5"> 
  <div class="row justify-content-center"> 
    <div class="col-md-8 col-lg-6"> 
      <div class="card shadow"> 
        <div class="card-body"> 
          <h2 class="text-center mb-4">Cadastro de Usuário Para Acessar o Sistema</h2> 
 
          <form  [formGroup]="form"(ngSubmit) = "onSubmit()"> 
            <div class="mb-3"> 
              <label for="nome" class="form-label">Nome completo</label> 
              <input type="text" class="form-control" id="nome" placeholder="Digite 
seu nome completo sem abreviação" formControlName = "nome" /> 
            </div> 
 
            <div class="mb-3"> 
              <label for="email" class="form-label">E-mail</label> 
              <input type="email" class="form-control" id="email" placeholder="Digite 
seu e-mail principal"  formControlName = "email"/> 
            </div> 
             <div class="mb-3"> 
              <label for="email" class="form-label">E-mail</label> 
              <input type="email" class="form-control" id="email" placeholder="Digite 
seu e-mail secundáriong " formControlName = "email"/> 
            </div> 
 
            <div class="mb-3"> 
              <label for="senha" class="form-label">Senha</label> 
              <input type="password" class="form-control" id="senha" 
placeholder="Digite sua senha"
#senhaInput
(input) ="validarSenha(senhaInput.value)" formControlName = "senha"
/> 
            </div> 
          <label [ngStyle]="{color:regraMinimoCaractere ? 'green' : 'red'}"><i>A senha deve ter no minimo 8 caractere</i></label><br>
          <label [ngStyle]="{color:regraMaximocaractere ? 'green' : 'red'}"><i>A senha deve ter no maximo 16 caractere</i></label><br>
          <label [ngStyle]="{color:regraLetraMaiuscula ? 'green' : 'red'}"><i>A senha deve ter ao menos uma letra maiuscula</i></label><br>  
          <label [ngStyle]="{color:regraCaractereEspecial ? 'green' : 'red'}"><i>A senha deve ter no minimo um caractere especial </i></label><br>
          <label [ngStyle]="{color:regraNumerosLetras ? 'green' : 'red'}"><i>A senha deve ter numeros e letras</i></label><br>
          <div class="mb-3"> 
              <label for="telefone" class="form-label">Telefone</label> 
              <input type="text" class="form-control" id="telefone" 
placeholder="Digite seu telefone" /> 
            </div> 
        <div class="mb-3"> 
              <label for="telefone" class="form-label">Telefone</label> 
              <input type="text" class="form-control" id="telefone" 
placeholder="Digite seu celular" required /> 
            </div> 
 
            <div class="mb-3"> 
              <label for="dataNascimento" class="form-label">Data de 
nascimento</label> 
              <input type="date" class="form-control" id="dataNascimento" /> 
            </div> 
 
            <div class="mb-3"> 
              <label for="cep" class="form-label">cep</label> 
              <input type="text" class="form-control" id="cep" 
placeholder="Digite seu cep" required formControlName="cep"/> 
            </div> 
            <div><button type="button" (click)="buscarCep">Buscar</button></div>
             <div class="mb-3"> 
              <label for="endereco" class="form-label">Logradouro</label> 
              <input type="text" class="form-control" id="endereco" 
placeholder="Digite seu endereço" formControlName="logradouro"/> 
            </div> 
            
            <div class="mb-3"> 
              <label for="cidade" class="form-label">Cidade</label> 
              <input type="text" class="form-control" id="cidade" placeholder="Digite 
sua cidade" /> 
            </div> 
 
            <div class="mb-3"> 
              <label for="estado" class="form-label">Estado</label> 
              <select class="form-select" id="estado"> 
                <option selected>Selecione</option> 
                <option>RJ</option> 
                <option>SP</option> 
                <option>MG</option> 
                <option>ES</option> 
                <option>BH</option> 
                <option>DF</option>
                <option>CE</option>  
              </select> 
            </div> 
 
            <div class="d-grid"> 
              <button type="submit" class="btn btn-primary">Cadastrar</button> 
            </div> 
          </form> 
 
        </div> 
      </div> 
    </div> 
  </div> 
</div>
